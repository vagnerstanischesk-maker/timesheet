<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.2.0/dist/tabler-icons.min.css">
<title>07 - Cadastros · Triscal</title>
<style>
:root{
--brand-orange:#CC4700;--brand-orange-dark:#9A3600;--brand-orange-bright:#E2640F;--brand-blue:#004ECC;--brand-indigo:#365899;
--color-background-primary:#ffffff;--color-background-secondary:#efefef;--color-background-tertiary:#f5f5f5;
--color-background-info:#FBEAE0;--color-background-success:#E4F3EB;--color-background-warning:#FCF3D6;--color-background-danger:#FBE7E5;
--color-text-primary:#222222;--color-text-secondary:#686868;--color-text-tertiary:#9a9a9a;
--color-text-info:#9A3600;--color-text-success:#0B6E3C;--color-text-warning:#8A6D00;--color-text-danger:#B5362C;
--color-border-tertiary:rgba(17,17,17,.12);--color-border-secondary:rgba(17,17,17,.22);--color-border-primary:rgba(17,17,17,.34);
--color-border-info:#E2640F;--color-border-success:#0F9D58;--color-border-danger:#DB4437;
--border-radius-md:8px;--border-radius-lg:12px;--border-radius-xl:16px;
}
@media (prefers-color-scheme:dark){:root{
--color-background-primary:#1a1a1a;--color-background-secondary:#222222;--color-background-tertiary:#111111;
--color-background-info:#3a1c0c;--color-background-success:#0d3a22;--color-background-warning:#3d3206;--color-background-danger:#3d1512;
--color-text-primary:#efefef;--color-text-secondary:#b0b0b0;--color-text-tertiary:#888888;
--color-text-info:#E2640F;--color-text-success:#5BD08C;--color-text-warning:#F4B400;--color-text-danger:#E8736A;
--color-border-tertiary:rgba(255,255,255,.14);--color-border-secondary:rgba(255,255,255,.28);
--color-border-info:#E2640F;--color-border-success:#0F9D58;--color-border-danger:#DB4437;
}}
*{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--color-text-primary);background:var(--color-background-tertiary);margin:0;padding:24px;line-height:1.5;-webkit-font-smoothing:antialiased}
.frame{max-width:760px;margin:0 auto}
.frame>h1{font-size:14px;font-weight:500;color:var(--color-text-secondary);margin:0 0 12px}
button{font:inherit;display:inline-flex;align-items:center;background:transparent;color:var(--color-text-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:8px 14px;cursor:pointer}
button:hover{background:var(--color-background-secondary)}
input,select,textarea{font:inherit;color:var(--color-text-primary);background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:7px 10px;height:36px}
textarea{height:auto}
p{margin:0}
table{border-collapse:collapse}
</style></head><body><div class="frame"><h1>Triscal · Apontamento de Horas — 07 - Cadastros (mockup)</h1>
<div style="font-size:13px;">
  <div style="display:flex; align-items:center; gap:8px; margin-bottom:12px; flex-wrap:wrap;"><i class="ti ti-folders" style="font-size:18px;" aria-hidden="true"></i><strong style="font-size:15px;">Cadastros · Projetos</strong><div style="margin-left:auto; display:flex; gap:8px;"><input placeholder="Buscar..." style="width:160px;" /><button style="gap:6px; border-color: var(--color-border-info); color: var(--color-text-info);"><i class="ti ti-plus" aria-hidden="true"></i> Novo</button></div></div>
  <div style="display:grid; grid-template-columns: 1fr 1.2fr; gap:14px;">
    <div style="border:0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow:hidden;">
      <div style="display:flex; align-items:center; gap:10px; padding:11px 12px; border-bottom:0.5px solid var(--color-border-tertiary); background: var(--color-background-info);"><span style="width:8px;height:8px;border-radius:50%;background:#378ADD;"></span><div style="flex:1; min-width:0;"><p style="margin:0; font-weight:500; color: var(--color-text-info);">Projeto Alfa</p><p style="margin:0; font-size:12px; color: var(--color-text-secondary);">Cliente Acme · ativo</p></div><i class="ti ti-chevron-right" style="color: var(--color-text-secondary);" aria-hidden="true"></i></div>
      <div style="display:flex; align-items:center; gap:10px; padding:11px 12px; border-bottom:0.5px solid var(--color-border-tertiary);"><span style="width:8px;height:8px;border-radius:50%;background:#1D9E75;"></span><div style="flex:1; min-width:0;"><p style="margin:0; font-weight:500;">Projeto Beta</p><p style="margin:0; font-size:12px; color: var(--color-text-secondary);">Cliente Globex · ativo</p></div></div>
      <div style="display:flex; align-items:center; gap:10px; padding:11px 12px; border-bottom:0.5px solid var(--color-border-tertiary);"><span style="width:8px;height:8px;border-radius:50%;background:#888780;"></span><div style="flex:1; min-width:0;"><p style="margin:0; font-weight:500;">Interno · Gestão</p><p style="margin:0; font-size:12px; color: var(--color-text-secondary);">Triscal · ativo</p></div></div>
      <div style="display:flex; align-items:center; gap:10px; padding:11px 12px; opacity:0.7;"><span style="width:8px;height:8px;border-radius:50%;background:#BA7517;"></span><div style="flex:1; min-width:0;"><p style="margin:0; font-weight:500;">Projeto Gama</p><p style="margin:0; font-size:12px; color: var(--color-text-secondary);">Cliente Initech · encerrado</p></div></div>
    </div>
    <div style="background: var(--color-background-primary); border:0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-lg); padding:16px;">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;"><strong style="font-size:14px;">Editar projeto</strong><span style="font-size:11px; padding:2px 8px; border-radius:999px; background: var(--color-background-success); color: var(--color-text-success);">ativo</span></div>
      <label style="font-size:12px; color: var(--color-text-secondary);">Descrição</label><input value="Projeto Alfa" style="width:100%; margin:4px 0 12px;" />
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px;"><div><label style="font-size:12px; color: var(--color-text-secondary);">Cliente</label><select style="width:100%; margin-top:4px;"><option>Acme S.A.</option></select></div><div><label style="font-size:12px; color: var(--color-text-secondary);">Filial de origem</label><select style="width:100%; margin-top:4px;"><option>São Paulo</option></select></div></div>
      <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:12px;"><div><label style="font-size:12px; color: var(--color-text-secondary);">Tipo</label><select style="width:100%; margin-top:4px;"><option>Cliente</option><option>Interno</option></select></div><div><label style="font-size:12px; color: var(--color-text-secondary);">Horas previstas</label><input value="1200" style="width:100%; margin-top:4px;" /></div><div><label style="font-size:12px; color: var(--color-text-secondary);">Status</label><select style="width:100%; margin-top:4px;"><option>Ativo</option></select></div></div>
      <div style="display:flex; gap:16px; margin-bottom:14px; font-size:13px;"><label style="display:flex; align-items:center; gap:6px;"><input type="checkbox" checked style="width:auto; height:auto;" /> Aceita horas CO</label><label style="display:flex; align-items:center; gap:6px;"><input type="checkbox" checked style="width:auto; height:auto;" /> Aceita horas NC</label></div>
      <div style="border-top:0.5px solid var(--color-border-tertiary); padding-top:12px; display:flex; align-items:center; justify-content:space-between;"><span style="font-size:12px; color: var(--color-text-secondary);"><i class="ti ti-subtask" style="font-size:13px; vertical-align:-1px;" aria-hidden="true"></i> 3 fases · 14 tarefas · 8 alocados</span><div style="display:flex; gap:8px;"><button>Cancelar</button><button style="gap:6px; border-color: var(--color-border-info); color: var(--color-text-info);"><i class="ti ti-device-floppy" aria-hidden="true"></i> Salvar</button></div></div>
    </div>
  </div>
</div>
</div></body></html>
