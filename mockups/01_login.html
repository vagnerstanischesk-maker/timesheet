<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.2.0/dist/tabler-icons.min.css">
<title>01 - Login (SSO) · Triscal</title>
<style>
:root{
--brand-orange:#CC4700;--brand-orange-dark:#9A3600;--brand-orange-bright:#E2640F;--brand-blue:#004ECC;--brand-indigo:#365899;
--color-background-primary:#ffffff;--color-background-secondary:#efefef;--color-background-tertiary:#f5f5f5;
--color-background-info:#FBEAE0;--color-background-success:#E4F3EB;--color-background-warning:#FCF3D6;--color-background-danger:#FBE7E5;
--color-text-primary:#222222;--color-text-secondary:#686868;--color-text-tertiary:#9a9a9a;
--color-text-info:#9A3600;--color-text-success:#0B6E3C;--color-text-warning:#8A6D00;--color-text-danger:#B5362C;
--color-border-tertiary:rgba(17,17,17,.12);--color-border-secondary:rgba(17,17,17,.22);--color-border-primary:rgba(17,17,17,.34);
--color-border-info:#E2640F;--color-border-success:#0F9D58;--color-border-danger:#DB4437;
--border-radius-md:8px;--border-radius-lg:12px;--border-radius-xl:16px;
}
@media (prefers-color-scheme:dark){:root{
--color-background-primary:#1a1a1a;--color-background-secondary:#222222;--color-background-tertiary:#111111;
--color-background-info:#3a1c0c;--color-background-success:#0d3a22;--color-background-warning:#3d3206;--color-background-danger:#3d1512;
--color-text-primary:#efefef;--color-text-secondary:#b0b0b0;--color-text-tertiary:#888888;
--color-text-info:#E2640F;--color-text-success:#5BD08C;--color-text-warning:#F4B400;--color-text-danger:#E8736A;
--color-border-tertiary:rgba(255,255,255,.14);--color-border-secondary:rgba(255,255,255,.28);
--color-border-info:#E2640F;--color-border-success:#0F9D58;--color-border-danger:#DB4437;
}}
*{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--color-text-primary);background:var(--color-background-tertiary);margin:0;padding:24px;line-height:1.5;-webkit-font-smoothing:antialiased}
.frame{max-width:760px;margin:0 auto}
.frame>h1{font-size:14px;font-weight:500;color:var(--color-text-secondary);margin:0 0 12px}
button{font:inherit;display:inline-flex;align-items:center;background:transparent;color:var(--color-text-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:8px 14px;cursor:pointer}
button:hover{background:var(--color-background-secondary)}
input,select,textarea{font:inherit;color:var(--color-text-primary);background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:7px 10px;height:36px}
textarea{height:auto}
p{margin:0}
table{border-collapse:collapse}
</style></head><body><div class="frame"><h1>Triscal · Apontamento de Horas — 01 - Login (SSO) (mockup)</h1>
<div style="background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 2rem 1.5rem; display:flex; justify-content:center;">
  <div style="width: 380px; background: var(--color-background-primary); border:0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-xl); padding: 28px 26px; text-align:center;">
    <div style="width:52px; height:52px; border-radius: var(--border-radius-md); background: var(--color-background-info); color: var(--color-text-info); display:flex; align-items:center; justify-content:center; margin:0 auto 14px;"><i class="ti ti-clock-hour-4" style="font-size:26px;" aria-hidden="true"></i></div>
    <p style="margin:0; font-size:20px; font-weight:500;">Triscal · Apontamento</p>
    <p style="margin:6px 0 22px; font-size:13px; color: var(--color-text-secondary);">Acesse com sua conta corporativa</p>
    <button style="width:100%; justify-content:center; gap:10px; height:44px; border-color: var(--color-border-info); color: var(--color-text-info); font-size:14px;"><i class="ti ti-brand-windows" style="font-size:18px;" aria-hidden="true"></i> Entrar com Microsoft Entra ID</button>
    <div style="display:flex; align-items:center; gap:10px; margin:18px 0;"><span style="flex:1; height:0.5px; background: var(--color-border-tertiary);"></span><span style="font-size:11px; color: var(--color-text-tertiary);">SSO seguro</span><span style="flex:1; height:0.5px; background: var(--color-border-tertiary);"></span></div>
    <p style="margin:0; font-size:12px; color: var(--color-text-secondary); display:flex; align-items:center; justify-content:center; gap:6px;"><i class="ti ti-shield-lock" style="font-size:14px;" aria-hidden="true"></i> Autenticação via Keycloak federando o Entra ID</p>
    <p style="margin:16px 0 0; font-size:11px; color: var(--color-text-tertiary);">Sem senha local · OpenID Connect</p>
  </div>
</div>
</div></body></html>
