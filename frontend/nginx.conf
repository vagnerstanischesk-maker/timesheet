server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;
  # SPA: rotas do React Router caem no index.html
  location / { try_files $uri /index.html; }
  # proxy da API para o backend (ajuste o host conforme o ambiente)
  location /api/ { proxy_pass http://backend:8080/api/; proxy_set_header Authorization $http_authorization; }
}
